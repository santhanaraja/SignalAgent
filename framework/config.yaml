framework:
  version: "1.0"
  last_updated: "2026-06-12"

# R28 real-dollar enforcement (PER-508 Phase 0; D-007 + D-008 Q4 govern).
# USER-MAINTAINED BY HAND until a broker integration exists — R28 computes
# every limit as a % of this number, so a stale value skews every dollar
# status. Derived at build time from the July-6 book reading ~19% deployed
# ($18,714 across IWM/ARWR/BIIB); correct it if the account has moved.
account_capital_usd: 100000

r28:
  # Per-GICS-group caps (D-007 Phase 0, AMENDED 2026-07-13 from 15%/2:
  # 15% against the 8% max position forced undersizing the second name
  # to 1.875-of-full; 20% fits two full-size positions with room. The
  # correlated-group tradeoff is acknowledged in the record — the July-6
  # biotech book. Ceiling unchanged (D-008 Q4 90/50/25/5); emergent:
  # 90/20 forces >=5 groups at full deployment.)
  group_max_pct: 20
  group_max_positions: 3

regime:
  # SWING-horizon gauge (weeks-long holds, checked daily).
  # Voters: vix_5d_avg, hy_spread, breadth.
  # spy_vs_200dma is the backdrop GATE (binary cap, not a voter).
  # yield_curve is a non-voting macro input (routed to macro_inputs).
  gauges:
    spy_vs_200dma:
      # BACKDROP GATE — any SPY close below the 200DMA caps risk-on states
      # at Caution. The thresholds below are kept for the gauge's own
      # signal classification (display), not for the vote.
      proxy: "SPY"
      lookback_days: 200
      risk_on_threshold: 0      # SPY > 200DMA = risk on
      caution_threshold: -2     # SPY within 2% below 200DMA
      risk_off_threshold: -5    # SPY >5% below 200DMA
    vix_5d_avg:
      proxy: "^VIX"
      lookback_days: 5
      risk_on_threshold: 18     # VIX < 18 = risk on
      caution_threshold: 22     # VIX 18-22 = caution
      risk_off_threshold: 27    # VIX > 27 = risk off
    hy_spread:
      # Primary: FRED series BAMLH0A0HYM2
      # Fallback: HYG/IEF price ratio (inverted — lower ratio = wider spread)
      fred_series: "BAMLH0A0HYM2"
      fallback_long: "HYG"
      fallback_short: "IEF"
      risk_on_threshold: 3.0
      caution_threshold: 4.0
      risk_off_threshold: 5.0
    breadth:
      # % of S&P 500 stocks above 50DMA
      # S5FI on yfinance, fallback: RSP/SPY ratio as breadth proxy
      proxy: "S5FI"
      fallback_proxy: "RSP"
      fallback_benchmark: "SPY"
      risk_on_threshold: 60
      caution_threshold: 50
      risk_off_threshold: 30
    yield_curve:
      # NON-VOTING macro input: 30Y-2Y Treasury spread (percentage points).
      # Primary: FRED API DGS30-DGS2 (requires FRED_API_KEY — set it in the
      #          Render env to get the true 2Y leg)
      # Secondary: FRED public CSV (keyless; Akamai-blocked as of 2026-07)
      # Fallback: yfinance ^TYX - ^IRX, labeled "30Y-3mo" (^IRX is the
      #          3-month bill, never presented as 2Y)
      fred_long: "DGS30"
      fred_short: "DGS2"
      risk_on_threshold: 0.50    # > 50bp positive spread = risk_on
      caution_threshold: 0.00    # 0bp to 50bp = caution
      risk_off_threshold: 0.00   # < 0bp (inverted) = risk_off

  # The min/max fields below are INFORMATIONAL — the authoritative mapping
  # lives in RegimeCalculator._determine_state() (3-voter ladder: 3 risk_on
  # -> Trending, 2 -> Choppy, 1 -> Caution, 0 -> Risk-off; ANY risk_off vote
  # caps at Caution; Risk-off requires 0 risk_on or 2+ risk_off; the 200DMA
  # gate caps risk-on states). Only name/action/color are read by code.
  states:
    - name: "Risk-on / Trending"
      min_risk_on_gauges: 3          # all 3 voters at risk_on
      max_caution_gauges: 0
      max_risk_off_gauges: 0
      action: "Full deployment. Aggressive sleeve active. New themes considered."
      color: "#3fb950"
    - name: "Risk-on / Choppy"
      min_risk_on_gauges: 2
      max_caution_gauges: 1
      max_risk_off_gauges: 0
      action: "Hold existing positions; new entries only on A+ setups; tighter stops."
      color: "#d29922"
    - name: "Caution"
      min_risk_on_gauges: 1          # or any single risk_off vote, or gate cap
      max_risk_off_gauges: 1
      action: "No new aggressive positions; raise stops; consider trimming."
      color: "#f0883e"
    - name: "Risk-off"
      min_risk_off_gauges: 2         # or zero risk_on votes (all voters reporting)
      action: "Defensive: no new entries; close speculative; cash / hedge."
      color: "#f85149"

  change_protocol:
    consecutive_confirmations_required: 2   # 2 consecutive Sundays to confirm regime change
    intra_week_override_triggers:
      - gauge: "vix_5d_avg"
        condition: ">"
        value: 27
        message: "VIX > 27 — intra-week risk-off override"
      - gauge: "spy_vs_200dma"
        condition: "<"
        value: 0
        message: "SPY closed below 200DMA — intra-week caution override"

themes:
  watchlist:
    - name: "AI Broad"
      proxy: "AIQ"
      constituents: ["NVDA", "PLTR", "MSFT", "GOOGL", "META", "AMZN", "CRWV", "SMCI"]
    - name: "Semis"
      proxy: "SMH"
      constituents: ["NVDA", "AVGO", "TSM", "MU", "AMD", "MRVL", "QCOM", "WDC", "SNDK", "ARM"]
    - name: "Quantum"
      proxy: "QTUM"
      constituents: ["IONQ", "RGTI", "QBTS", "IBM", "GOOGL"]
    - name: "Energy"
      proxy: "XLE"
      constituents: ["XOM", "CVX", "COP", "SLB", "EOG", "MPC"]
    - name: "Gold"
      proxy: "GLD"
      constituents: ["NEM", "GOLD", "AEM", "FNV", "WPM"]
    - name: "Defense"
      proxy: "ITA"
      constituents: ["LMT", "RTX", "NOC", "GD", "BA", "PLTR"]
    - name: "Crypto"
      proxy: "IBIT"
      constituents: ["COIN", "MSTR", "MARA", "RIOT", "CLSK"]
    - name: "Biotech"
      proxy: "XBI"
      constituents: ["MRNA", "BNTX", "VRTX", "REGN", "BIIB"]

  ranking:
    lookback_4w: 20              # trading days
    lookback_12w: 60             # trading days
    composite_method: "rank_average"
    max_active_themes: 2

  entry_rule:
    requires_top_n_rank: 2       # must rank #1 or #2
    consecutive_sundays_required: 2
    regime_required:
      - "Risk-on / Trending"
      - "Risk-on / Choppy"
    discretionary_review_required: true

  exit_rule:
    drops_below_rank: 3          # exits if rank drops to #4+
    consecutive_sundays_required: 3
    regime_degradation_triggers_exit: true

  concentration_limits:
    max_per_theme_pct_of_book: 15
    max_total_themes_pct_of_book: 25

# ---------------------------------------------------------------------------
# Position signal engine (Build 1B) — per-ticker exit/re-entry state machine.
# Consumes the swing gauge and weekly theme qualification READ-ONLY.
# Signals only; nothing is auto-executed. Input: framework/state/positions.json
# ---------------------------------------------------------------------------
positions:
  sma_period: 20
  confirmation_closes: 2       # consecutive closes above SMA20 to confirm
  atr_period: 14
  atr_mult: 0.5                # one close > SMA20 + 0.5*ATR(14) also confirms
  slope_lookback_days: 5       # SMA20 flat-or-rising vs 5 sessions ago
  extension_guard_max: 1.8     # watchers above this xATR over SMA20 cannot go
                               # RE_ENTRY_READY (EXTENDED_HOLD instead); holdings
                               # exempt — PER-508 item 20. Calibrated 2026-07-09:
                               # above normal trending distance (Monday fills came
                               # in at 1.06-1.64xATR; ARWR 1.64x was the week's
                               # best entry), below blowoff (MRNA 2.03x suppressed)

standing_rules:
  R1: "Weekly Sunday review (regime + themes). Do not skip."
  R2: "Risk-off regime -> no new aggressive positions."
  R3: "New theme entry requires #1/#2 rank for 2 consecutive Sundays AND risk-on regime AND discretionary catalyst review."
  R4: "Theme exits when below #3 for 3 consecutive Sundays OR regime degrades to Caution/Risk-off."
  R5: "Maximum 2 themes active. Cash is the default."
  R6: "Define invalidation before entry. Written down. Close-based."
  R7: "Size from risk-to-stop, not gut, not conviction, not max premium."
  R8: "No naked momentum exposure through binary catalysts."
  R9: "Verify compliance scope before entering any new instrument class."
  R10: "Stop moves UP only. Never lower a stop in adversity."
  R11: "Decisions on the exit-timeframe CLOSE, never on intraday wicks."
  R12: "Exit timeframe must be slower than entry timeframe."
  R13: "Never override a fired stop."
  R14: "Bank big winners back to preservation core where tax-efficient."
  R15: "Maximum single-position size: 5-8% of relevant account's capital."
  R16: "Maximum single-theme exposure: 15% of total book."
  R17: "Maximum total theme exposure (across all active themes): 25% of total book."
  R18: "Minimum cash reserve at all times: 30-40% in money market vehicles."
  R19: "Aggressive sleeve cost basis capped at active theme limits."
  R20: "Never fund the aggressive sleeve from preservation core. Never cross-fund between accounts."
  R21: "No new entries on same day as stop-out from related name."
  R22: "Hot tape => deploy slowly."
  R23: "Conviction expresses through stop placement, not oversizing."
  R24: "Hitting target = sell signal. No goalpost-moving."
  R25: "Don't add to position because it's working. Add only on pullbacks per pre-committed plan."
  R26: "No margin leverage on aggressive options trades."
  R27: "Flexibility means switching themes by rules, not by feel."

# ---------------------------------------------------------------------------
# Dynamic dashboard universe (source layer — not yet wired into signal_engine)
# Consumed by universe_source.py / gics_classifier.py. UniverseSource receives
# this `universe` subtree as its `config` arg.
# ---------------------------------------------------------------------------
universe:
  source:
    etf_holdings:
      - SPY
      - QQQ
      - IWM
      - XLE
      - XLF
      - XLK
      - XLV
      - XLI
      - XLY
      - XLP
      - XLU
      - XLB
      - XLRE
      - XLC
      - SMH
      - AIQ
      - QTUM
      - ITA
      - IBIT
      - XBI
      - GLD
    include_sp500: true
    manual_additions: []
    manual_exclusions:
      - PSTG  # currently failing yfinance >=20 days quality gate

  cache:
    universe_ttl_days: 7
    gics_ttl_days: 30

  # Canonicalize classification labels to pure GICS sub-industry names.
  # Applied as a read-time view in GICSClassifier — the on-disk cache keeps
  # raw values, so edits here are reversible and take effect immediately.
  # Left side: custom/legacy/yfinance labels observed in live data.
  gics_aliases:
    # Legacy custom INDUSTRY_GROUPS names -> pure GICS
    "Semiconductors — Memory & HBM": "Semiconductors"
    "Coal & Consumable Fuels (Uranium)": "Coal & Consumable Fuels"
    # yfinance (Yahoo taxonomy) labels -> GICS equivalents
    "Communication Equipment": "Communications Equipment"
    "Engineering & Construction": "Construction & Engineering"
    "Drug Manufacturers - Specialty & Generic": "Biotechnology"
    "Diagnostics & Research": "Life Sciences Tools & Services"
    "Computer Hardware": "Technology Hardware, Storage & Peripherals"
    "Electrical Equipment & Parts": "Electrical Components & Equipment"
    "Solar": "Electrical Components & Equipment"
    "Uranium": "Coal & Consumable Fuels"
    # Defensive: common Yahoo labels not yet observed in live data, mapped
    # ahead of time so a future non-S&P ticker can't split an existing group.
    "Semiconductor Equipment & Materials": "Semiconductor Materials & Equipment"
    "Oil & Gas E&P": "Oil & Gas Exploration & Production"
    "Oil & Gas Midstream": "Oil & Gas Storage & Transportation"
    "Oil & Gas Integrated": "Integrated Oil & Gas"
    "Banks - Regional": "Regional Banks"
    "Banks - Diversified": "Diversified Banks"
    "Software - Application": "Application Software"
    "Software - Infrastructure": "Systems Software"
    "Internet Content & Information": "Interactive Media & Services"
    "Utilities - Independent Power Producers": "Independent Power Producers & Energy Traders"
    "Insurance - Property & Casualty": "Property & Casualty Insurance"

  # Weekly rotation parameters for the active dashboard universe
  # (consumed by universe_builder.py).
  rotation:
    top_n: 15
    min_candidates: 3              # groups need >=3 candidate tickers for a slot
    max_tickers_per_group: 7
    min_composite_score: 50        # existing dashboard score_stock scale (0-100)
    min_market_cap: 500000000      # 500M USD (foreign caps FX-converted)
    min_avg_volume: 500000         # 500K shares/day (63-trading-day mean)
    min_history_days: 90           # calendar days of price history
    composite_weights:
      ytd: 0.50
      r3m: 0.30
      r1m: 0.20
