name: Update Signal Data

on:
  schedule:
    # Every 15 minutes during US market hours (Mon-Fri, 9:30 AM - 4:30 PM ET)
    # GitHub Actions uses UTC — ET is UTC-5 (EST) or UTC-4 (EDT)
    # 9:30 AM ET = 14:30 UTC (EST) / 13:30 UTC (EDT)
    # 4:30 PM ET = 21:30 UTC (EST) / 20:30 UTC (EDT)
    # We cover both EST/EDT by running 13:30-21:30 UTC
    - cron: '*/15 13-21 * * 1-5'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

# Serialize with rotate-universe.yml — both commit data artifacts to main
concurrency:
  group: signal-data-commits
  cancel-in-progress: false

jobs:
  update-signals:
    runs-on: ubuntu-latest
    # 30 min: a run that self-heals a missed Friday rotation carries a full
    # ~530-ticker universe rebuild before the signal scan (rotate-universe.yml
    # budgets 30 for the rebuild alone; see get_industry_groups self-healing)
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Signal Engine
        run: python signal_engine.py
        env:
          PYTHONUNBUFFERED: '1'

      # D-012: append today's Fear & Greed reading to data/fear_greed_history.json
      # (once-per-day upsert inside the script — last write of the day wins, so
      # the post-close run leaves the closing value). Reads the committed universe
      # artifact for the Market Internals breadth row (no extra universe fetch).
      # Rides the data commit below. continue-on-error + the script never exits
      # non-zero: an F&G/network hiccup must never block the data pipeline.
      - name: Persist Fear & Greed history
        continue-on-error: true
        run: python fear_greed_engine.py
        env:
          PYTHONUNBUFFERED: '1'

      # Framework runs BEFORE the history manager: history_manager reads
      # public/framework.json to log regime_change events (PER-508 item 18),
      # which must reflect THIS run's regime, not the previous one's.
      # continue-on-error: a framework failure leaves the previous artifact
      # in place (no regime change seen) and must not block signal history.
      - name: Run Framework Engine
        run: python -m framework.framework_runner
        env:
          PYTHONUNBUFFERED: '1'
        continue-on-error: true

      - name: Run History Manager
        run: python history_manager.py

      # PER-510-B: intraday stop-breach alerts, HOLDINGS only. Gated
      # in-script to market hours (9:30 <= ET < 16:00), once per ticker per
      # tier per day (data/last_intraday_alerts rides the data commit).
      # CADENCE REALITY: this fires on the throttled hourly runs (~5x/day),
      # so detection lag is up to ~an hour — an hourly check, not a tick
      # watcher. Information only; the close still decides (R11). Same
      # never-fail/never-leak contract as items 22/23.
      - name: Intraday stop-breach alerts
        continue-on-error: true
        env:
          ASSESSMENT_WEBHOOK_URL: ${{ secrets.ASSESSMENT_WEBHOOK_URL }}
          PYTHONUNBUFFERED: '1'
        run: python notify_intraday.py

      # PER-508 item 22: post-close Slack push. Gating (ET hour >= 16,
      # weekday, once per trading day) is computed INSIDE the script —
      # GitHub throttles this cron, so slot timing is unreliable. Placed
      # BEFORE the commit step so the data/last_notified marker rides the
      # data commit (fresh clone every run; an uncommitted marker would
      # double-post on the next throttled run). A Slack outage must never
      # block the data pipeline: continue-on-error here AND the script
      # itself never exits non-zero.
      - name: Post-close assessment notification
        continue-on-error: true
        env:
          ASSESSMENT_WEBHOOK_URL: ${{ secrets.ASSESSMENT_WEBHOOK_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          PYTHONUNBUFFERED: '1'
        run: python notify_assessment.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet public/ data/ framework/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "SignalAgent Bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add public/signals.json public/history.json public/snapshots/ data/ public/framework.json framework/output/ framework/state/ public/universe_ranking.json public/universe_candidates.json
          git commit -m "data: update signals $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
