name: Rotate Active Universe

on:
  schedule:
    # Friday 8 PM EST / 9 PM EDT (Sat 01:00 UTC) — after the weekly close.
    # The build computes on the completed week's data and becomes the active
    # universe FOR THE FOLLOWING TRADING WEEK (week_key = that Friday), so it
    # is reviewable over the weekend and Monday's signal runs see a current
    # cache. If this run fails, Monday's first signal run rebuilds via
    # get_industry_groups() (self-healing).
    # :07 offset — GitHub heavily throttles the :00 top-of-hour pile; an
    # off-peak minute makes the Saturday slot actually fire near-schedule.
    - cron: '7 1 * * 6'

  # Manual trigger from the GitHub UI — identical to the cron run (same job,
  # same artifacts, same week_key labeling; the key depends only on WHEN it
  # runs relative to the Friday 20:00 ET boundary).
  workflow_dispatch:

permissions:
  contents: write

# Serialize with update-signals.yml — both commit data artifacts to main
concurrency:
  group: signal-data-commits
  cancel-in-progress: false

jobs:
  rotate-universe:
    runs-on: ubuntu-latest
    # 30 min: cold-cache candidate assembly + 1y prices for ~530 tickers with
    # up to 200 single-ticker retries + market caps with a retry pass
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build active universe (weekly rotation)
        run: python universe_builder.py --force
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check for changes
        id: check
        run: |
          git add -N data/ public/
          git diff --quiet data/universe_active.json public/universe_ranking.json public/universe_candidates.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push rotated universe
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "SignalAgent Bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add data/universe_active.json public/universe_ranking.json public/universe_candidates.json
          git commit -m "data: rotate active universe $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
